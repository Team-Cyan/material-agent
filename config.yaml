# ---------------------------------------------------------------------------
# material-agent NAS-first runtime profile
#
# Design target:
#   - no Ollama or OMLX service dependency in the default path
#   - Intel iGPU first through OpenVINO / ONNX Runtime provider work
#   - CPU fallback must remain valid for any NAS
# ---------------------------------------------------------------------------
backend: local
output_language: zh
log_level: info
commentary_enabled: false
input_dir: "/path/to/photos"
reprocess: false
raw_extensions: [ARW, CR3, NEF, RAF, DNG, ORF, RW2]

legacy:
  # OMLX/Ollama are compatibility and teacher-only paths. They cannot be
  # selected by `run` unless this gate is explicitly enabled.
  enabled: false

local:
  # Local backend is the only default backend in material-agent. It currently
  # provides deterministic heuristics and is the seam for ONNX/OpenVINO scorers.
  semantic:
    # First learned vertical slice. Keep disabled until the deployment installs
    # the `local-models` optional dependencies and benchmark-approved weights.
    enabled: false
    enforce_available: false
    # Bump if a mutable remote weight tag is replaced without changing its name.
    cache_revision: mobileclip2-s0-dfndr2b-v1
    model_name: MobileCLIP2-S0
    pretrained: dfndr2b
    device: cpu
    min_confidence: 0.30
  quality:
    # Raw no-reference quality priors. They remain outside total-score fusion
    # until benchmark calibration approves a versioned policy.
    enabled: false
    enforce_available: false
    # Bump when calibrated PyIQA weights change under the same metric names.
    cache_revision: quality-priors-v1
    device: cpu
    policy_version: quality-priors-v1
    metrics:
      brisque:
        enabled: true
        role: reject_prior
        lower_better: true
        raw_min: 0.0
        raw_max: 100.0
        weight: 0.5
      niqe:
        enabled: true
        role: reject_prior
        lower_better: true
        raw_min: 0.0
        raw_max: 10.0
        weight: 0.5
      musiq:
        enabled: false
        role: quality
        lower_better: false
        raw_min: 0.0
        raw_max: 100.0
        weight: 1.0
      nima:
        enabled: false
        role: aesthetic
        lower_better: false
        raw_min: 0.0
        raw_max: 10.0
        weight: 0.5
      clipiqa+:
        enabled: false
        role: aesthetic
        lower_better: false
        raw_min: 0.0
        raw_max: 1.0
        weight: 0.5
  embedding:
    enabled: false
    enforce_available: false
    runtime: transformers
    model_name: facebook/dinov2-small
    device: cpu
    model_path: ""
    processor_path: ""
    compiled_cache_dir: "~/.material-agent/openvino-cache"
  face:
    enabled: false
    enforce_available: false
    # Bump if model_asset_path is replaced in place.
    cache_revision: face-landmarker-v1
    model_asset_path: "~/.material-agent/models/face_landmarker.task"
    num_faces: 5
    min_detection_confidence: 0.5

inference:
  # First implementation target: Intel CPU + integrated/discrete GPU through
  # OpenVINO. Later tags can add CUDA, MIGraphX, and native Apple providers
  # without changing the scoring pipeline contract.
  runtime: openvino
  device: "AUTO:GPU,CPU"
  fallback_device: "CPU"
  model_cache_dir: "~/.material-agent/models"
  provider_tags: [intel-openvino, cpu]
  enforce_available: false

grouping:
  enabled: true
  time_gap_seconds: 30
  visual_similarity:
    enabled: true
    hash_threshold: 10
    max_merge_gap_minutes: 10
  embedding_similarity:
    # Opt-in until real-camera grouping calibration is complete.
    enabled: false
    threshold: 0.85
  group_guard:
    enabled: true
    min_score: 7.0

preview:
  # Prefer the camera-embedded JPEG/thumbnail for NAS-scale scoring. Full RAW
  # demosaic is only a fallback when the file has no usable embedded preview.
  prefer_embedded: true
  fallback_decode: half_size
  max_size: 1024
  jpeg_quality: 85

focus_integrity:
  enabled: true
  # Current focus scoring is a preview proxy. High-resolution ROI focus should
  # be enabled only after a dedicated candidate pass is wired.
  mode: preview_proxy
  high_resolution_roi: false
  downscale_warning_ratio: 3.0

portrait_face_eye:
  # Disabled by default until a face/eye ROI model is wired into the pipeline.
  enabled: false
  min_face_ratio: 0.08
  review_penalty: 0.8

scorers:
  exposure:
    enabled: true
    weight: 0.25
    min_score: 0.0
    overexpose_threshold: 0.02
    overexpose_hard_limit: 2.0
    underexpose_threshold: 0.20
    underexpose_hard_limit: 2.0
  sharpness:
    enabled: true
    weight: 0.20
    min_score: 0.0
    min_variance: 50
    max_variance: 1000
  subject:
    enabled: true
  composition:
    enabled: true
  lighting:
    enabled: true
  color:
    enabled: true
  clarity:
    enabled: true
  depth:
    enabled: true
  mood:
    enabled: true

scoring:
  # Bump for deliberate scoring-policy migrations outside normal config fields.
  cache_revision: score-policy-v2
  pixel_weight: 0.35
  vision_weight: 0.65

screening:
  # MUSIQ remains opt-in because the lean CPU/OpenVINO images do not bundle
  # torch/pyiqa. Enable it only in a calibrated quality-model environment.
  enabled: false
  backend: musiq
  tier1_threshold: 0.5
  tier2_threshold: 0.25
  musiq:
    metric: musiq
    device: cpu
    score_divisor: 10.0
    python_bin: "~/.material-agent/musiq-venv/bin/python"

review_pipeline:
  score_prefetch_window: 2

xmp:
  write_mode: sidecar
  compatibility_profile: adobe
  # Machine-generated pj:* tags are stored in xmp:Identifier instead of normal
  # dc:subject keywords, so Lightroom/Photomator see clean user keywords.
  machine_tag_target: identifier

decision_policy:
  keep_threshold: 7.5
  review_threshold: 5.5
  hard_reject:
    technical_quality_below: 1.5
    subject_focus_below: 1.5

screening_policy:
  weight: 0.10
  top1_review_fallback: true

